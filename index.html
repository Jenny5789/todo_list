<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합형 그룹 To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>To-Do List</h1>

    <div class="creator-box">
        <h3>📂 새로운 그룹 및 할 일 추가</h3>
        
        <div class="input-row">
            <select id="groupHistorySelect" class="main-select" onchange="toggleGroupInputMode(this.value)">
                <option value="write_direct">✍️ 새 그룹 직접 입력하기</option>
                <option value="none_assigned">📁 그룹 미지정 (기본 목록)</option>
            </select>

            <select id="groupColorSelect" class="color-select">
                <option value="theme-red" style="color: #ff4d4d; font-weight: bold;">🔴 빨강</option>
                <option value="theme-default" style="color: #ff8c42; font-weight: bold;">🟠 주황</option>
                <option value="theme-yellow" style="color: #d4a373; font-weight: bold;">🟡 노랑</option>
                <option value="theme-green" style="color: #2a9d8f; font-weight: bold;">🟢 초록</option>
                <option value="theme-blue" style="color: #4a90e2; font-weight: bold;">🔵 파랑</option>
                <option value="theme-purple" style="color: #9b5de5; font-weight: bold;">🟣 보라</option>
            </select>

            <input type="text" id="newGroupNameInput" placeholder="생성할 그룹 이름을 입력하세요">
        </div>

        <div class="group-todo-adder-top">
            <input type="date" id="topTodoDate">
            <input type="text" id="topTodoInput" placeholder="추가할 할 일 내용을 바로 입력하세요">
            <button onclick="handleSubmitTopForm()" class="btn-accent">할 일 등록</button>
        </div>
    </div>

    <hr class="section-divider">
    <div class="filter-tabs-header">
        <button class="tab-btn active" onclick="filterTodos('all', this)">전체 보기</button>
        <button class="tab-btn" onclick="filterTodos('todo', this)">예정</button>
        <button class="tab-btn" onclick="filterTodos('doing', this)">진행중</button>
        <button class="tab-btn" onclick="filterTodos('done', this)">완성</button>
    </div>

    <div id="mainContainer">
        <div id="emptyNotice" class="empty-notice">아직 등록된 목록이 없습니다. 상단에서 할 일을 입력해보세요!</div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
